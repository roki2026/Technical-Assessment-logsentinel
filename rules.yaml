# LogSentinel configuration — everything here OVERRIDES/EXTENDS built-in defaults.
# Delete anything you don't want to change; the tool ships with sane defaults.

thresholds:
  brute_force:        {count: 5, window_sec: 300}    # failed SSH logins per IP
  web_login_brute:    {count: 6, window_sec: 300}    # failed login POSTs per IP
  password_spray:     {users: 5, window_sec: 600}    # distinct usernames per IP
  rate_limit:         {requests: 60, window_sec: 60} # web requests per IP
  recon_404:          {count: 15, window_sec: 300}   # 404s per IP
  port_scan:          {distinct_ports: 10, window_sec: 120}
  exfil_bytes:        50000000                       # single-response size (bytes)
  beacon_min_requests: 6                             # C2 beacon detection
  beacon_max_jitter:   0.15                          # interval regularity (0–1)
  off_hours:          {start: 0, end: 5}             # insider off-hours window
  cloud_login_failures: {count: 5, window_sec: 600}

internal_networks: ["10.", "192.168.", "172.16."]

# Turn individual detectors on/off
detectors:
  brute_force: true
  web_login_brute: true
  password_spray: true
  unauthorized_access: true
  sqli: true
  path_traversal: true
  rate_limit_abuse: true
  sudo_misuse: true
  malware: true
  recon: true
  port_scan: true
  exfiltration: true
  insider: true
  persistence: true
  lateral_movement: true
  c2: true
  credential_attacks: true
  email_attacks: true
  supply_chain: true
  cloud: true
  container_k8s: true
  iot: true
  policy: true
  malformed: true
  correlation: true

# Custom pattern rules — these EXTEND the built-in ruleset.
# field: message | path | user_agent | process
# Set `replace_rules: true` at top level to discard built-ins entirely.
pattern_rules:
  - id: CUSTOM-001
    category: Policy Violations
    severity: low
    field: path
    regex: "(?i)/internal-tools/"
    mitre: "-"
    description: "External access to internal-tools endpoint"
